body:
  text: 卷三疔瘡部立馬回疔丹金腳信五分蟾酥血竭辰砂沒藥各五分輕粉冰片麝香各二分半共為極細末用草烏頭煎汁和勻作細條能治一切疔瘡疔毒走黃險症又方去血竭沒藥冰片加硼砂白丁香蜈蚣乳香末雄黃末拔疔毒方硇砂白礬硃砂食鹽各三錢擇丁日午時先將礬鹽二味放鐵鏽刀頭上煆干共研極細罐貯聽用散疔丸蟾酥明礬各三錢殭蠶辰砂各一錢半牛黃冰片各一錢麝香七分共為極細末用煉白黃占滾化稍冷定入前藥末和丸如麻子大每服七分蔥頭白酒送下取微汗為度拔疔丹蜣螂一個去頭翅硇砂五分白信五分共搗為丸如椒子大先以三稜針刺瘡約深幾許將此丹納入以頂針捺下須臾大痛皆變黃水而出然後以野菊花不拘根葉搗汁一盞和酒服之連進三服盡醉為度再以人中黃為丸日日服用好酒送下全愈疔瘡走黃丸雄黃生軍巴豆肉去心皮各等分共搗如泥以飛面陳醋煮糊為丸如鳳仙子大重者每服二十三丸輕者每服二十一丸放舌上熱水服送下服後打噎為愈如瀉更妙三五次後米湯水下止之如不省人事以二十三丸水化灌之此方去雄黃加川鬱金少許治纏喉急痹並濕痰流注楊梅初起疔毒祕丸人指甲不拘多少炒黃研細麝香一分便壺底一匙共研勻和丸如米大又方加耳垢齒垢腳爪更妙保生錠子巴豆肉四十九粒連殼文武火炒研硼砂二錢輕粉半大匣金頂砒二錢雄黃二錢麝香一錢共為極細末用黃占五錢熔開將藥和成錠子冷水浸少時取出旋丸捏作餅子如錢眼大將瘡頭撥開安一餅子頂上膏蓋能治疔瘡背疽瘰癧一切惡瘡回疔散土蜂窠帶子一兩蛇蛻一條泥固火煆存性研極細末能治走黃危症白湯送服二錢或酒送亦可少刻大痛痛則許救毒化黃水痛止令活五香散丁香四分木香乳香沉香各四分麝香五釐腰黃六分共研好醋調須於端午日午時合之或天德吉日亦可用針挑破瘡頭將醋一點用藥少許安膏藥上貼之能治疔瘡赤黃危急二三日即愈人龍散蛔蟲熯燥一錢如無用五穀蟲代白礬三分蟾酥三分火酒化共調勻搽之治翻唇疔毒少刻疔破流毒水即愈拔疔散硇砂白丁香輕粉蜈蚣各一錢全蠍麝香各二錢金頂砒六分共為極細末取蟾酥一錢火酒化同搗和丸如芥子大帶長以便插入疔孔又方麝香血竭乳香沒藥靈磁石冰片蒼耳子蟲瓦上炙淨油各等分研細末貼急治疔瘡神效方乳香沒藥各六分赤芍二錢元參一錢冰片麝香各六分龍虎鬥五錢即青小蛇與壁虎鬥死者如無以斑蝥六錢糯米同炒黃去米研全蠍六個去頭足立馬回疔丹代之共研極細末收貯勿泄氣臨用摻膏藥上貼之自能穿破候擠出血根即愈真神方也喉症部金余散此方凌府備用照分不可增減人指甲五分煆鵝管石三分煆真腰黃二分硼砂三分漂大梅片一分殭蠶二分炒斷絲共研至無聲為度吹之能治爛喉痧及緊喉風冰硼散龍腦薄荷一錢烘燥為末硼砂一錢漂人中白八分川連生末八分青黛五分元明粉五分九制陳膽星五分山豆根八分大梅片二分共研極細末吹之能治一切咽喉各症冰硼散金鑰匙方火硝一錢五分白月石五分冰片三釐研細吹之能治咽喉諸症雙單乳蛾又方冰片五分月石五錢元明粉五錢辰砂六分七寶散西牛黃五分真廉珠三錢大梅片二分真象牙屑三錢焙黃淨真青黛六錢人指甲五分男用女女用男壁喜窠四五個多多益善板上不用共乳無聲為度吹之能治喉痧一切喉風急症珠黃散珍珠犀牛黃各一分青魚膽一錢真者陰乾大冰片麝香各一分共研無聲不可泄氣吹之能治咽喉十八症吹喉散青黛龍腦薄荷各八分飛淨雄黃三分粉口兒茶五分大梅片一分月石三分珍珠三分犀黃一分五釐研極細末罐貯勿泄氣吹之能治咽喉十八症吹喉散珍珠末二錢青黛三錢犀黃一錢月石三錢麝香二分五釐兒茶二錢梅片三錢血竭三錢熊膽三錢山豆根八錢去油乳香三錢沒藥三錢共為細末吹小清涼散犀黃四分粉口兒茶一錢龍腦薄荷尖四分青黛五錢月石二錢元明粉一錢人中白三錢煆生珠一錢乳細大梅片一錢共為極細末吹之能治咽喉十八症清涼散宋半夏末一錢龍腦薄荷尖末一錢桔梗末一錢生大黃末一錢漂芒硝一錢漂月石一錢珠母粉二錢青黛一錢冰片三分雄精炒天蟲末射干未各一錢山豆根末一錢元參末一錢粉草末一錢枯礬一錢青果核十個煆存性威靈仙末一錢九制膽星一錢共研勻吹之能治咽喉十八症寶珠丹白硼砂二錢川連一錢二分番木鱉去殼麻油炸松黃柏青黛水飛薄荷尖水飛雄黃人中白煆兒茶膽礬血竭冰片各五分燈心灰三分共為細末收貯勿泄氣吹之能治咽喉及口疳人中白散此方凌府備用應驗如神真青黛月石各一錢龍腦薄荷末五分人中白一錢梅片二分粉口兒茶一錢元明粉五分馬屁勃五分研吹能治咽喉口舌諸症或加犀黃三分珍珠五分其效更速咽喉急症異功散斑蝥去翅足同米炒黃去米取淨末四錢血竭六分沒藥六分全蠍元參各六分麝香三分冰片三分共為細末收貯勿令出氣不論爛喉痧喉風喉痹雙單乳蛾用膏藥一張取藥如黃豆大貼項間左貼左右貼右中貼中至三四時即起疱用針挑破即愈險症起疱更速也玉鑰匙月片五錢牙硝一兩五錢炒天蟲一錢冰片三分共為末吹之能治風熱喉痹及纏喉風症紫袍散真石青青黛辰砂月石各一兩膽礬煆人中白元明粉各五錢山豆根二錢共為末能治咽喉十八症冰梅丸南星生用二十五個切片子鮮大半夏十五個切片皂角去弦四兩白礬食鹽防風朴硝各四兩桔梗二兩大半熟青梅百個先將硝鹽水浸一周時然後將各藥研碎入水拌再將梅子置水中其水過梅子為度浸七日取出曬乾再入水中浸透再曬乾如是以水乾為度收貯瓷器中起霜為妙每含口中咽其汁而痰自出能治咽喉十八症一梅可治三人不可輕棄霹靂錠牙皂一百四十個火煨延胡索二兩生曬研飛青黛六分麝香一錢共為細末水和成錠每重二三分日乾收貯勿令泄氣不論喉風喉痹風雙單乳蛾斑痧小兒驚風諸險症立即奏效如遇牙關緊閉即從鼻孔灌入藥下即開每服一錠重者加服小錠磨汁沖服真神方也仙露梅大青梅子三斤青鹽四兩食鹽二兩活蝸牛四十個杵爛共拌勻隔一夜以後日曬夜收鹽盡為度瓷器收貯每取肉少許含咽能治咽喉大症垂危者立愈喉風吊痰方紫菀牙硝等分為末含之又方用七葉一枝梅陰乾研細吹如新鮮搗乾用根磨汁塗能消無名腫毒喉癬吹藥方哺胎雞蛋殼一錢連衣燒灰存性兒茶五分橄欖核五分犀牛黃五分廉珠五分人乳粉五分銀瓢制明雄黃五分真梅片三分樟冰片不可誤用切囑共研極細末吹患處諸瘡部一抹光上白豬板油一斤去膜麻黃四兩去根節木鱉肉四個全斑蝥四隻明礬三錢大楓子肉四十個先將豬油放瓦罐內文武火熔化宜先入水半杯於罐中恐罐燒破以夏布作袋將麻黃袋於其中以線扎口放油內先要蘆根數條放罐底煎半枝香為度取出再將斑蝥木鱉袋入原袋中扎口仍煎半枝香取出瀝乾將大楓子敲碎同明礬入油內略煎掇放地上一夜取油搽擦又方麻黃三兩去根小磨麻油二兩同入銅鍋內熬黑撈去渣將油瀝清後入鍋內熬熱投入白蠟二兩研末黃蠟二兩切碎攪勻離火再入研細硫黃一兩二錢炒花椒六錢生明礬六錢枯白礬八錢炒甘草四錢調成膏隔宿取出搽擦又方熟豬油一碗麻油一兩川椒二錢同熬去渣再投研細之硫黃五錢樟腦三錢血竭三錢輕粉一錢明礬二錢攪成膏擦膿窠癢瘡方枯礬一兩川椒三錢硫黃三錢豬毛灰二錢共研細末豬油調搽一方加丁香一錢又方大楓肉五錢油核桃肉五錢信五分水銀一錢桕油燭三文一枝先將楓桃二肉搗如泥次入水銀燭研至不見星再入信末和勻分作六丸每日臥時用一丸將絹包裹在心窩擂煬為度手不可摸穢物擂至五日停一日至第七日再擂藥一次次早胸前必發細瘰以手摩之微痛當日即愈甚者用一料七日全愈永不再發又方煙膠蛇床子血竭黃丹輕粉大楓子硫黃樟腦水銀如膿窠瘡不用蜈蚣一切瘡疥方樟腦一錢蜈蚣兩條冰片五分大楓肉二錢豬板油一兩白礬二錢雄黃二錢白砒二錢共搗勻搽陸定圃先生方廚房倒掛灰塵三錢煆伏地氣松香茴香花椒枯礬煆硫黃癲蝦蟆蒼朮白芷硃砂各一錢共研細末用雞子一個中挖小孔灌藥其中紙封口置幽火中燉熟輕去其殼存衣再用生豬油和藥搗爛葛布包時擦癢處其效如神疥瘡剪草散蛇床子三錢寒水石二前蕪荑二錢剪草一錢吳茱萸枯礬黃柏各一錢蒼朮五分厚朴五分明雄黃五分輕粉一錢共為末香油調敷專治癬疥等症一掃光輕粉五錢樟腦五錢大楓肉一錢三分雄黃一錢三分蛇床子二錢五分苦參二錢五分蕪荑二錢五分硫黃一錢三分枯礬三錢川椒一錢三分共為細末豬油調搽又方胡椒一錢雄黃二錢枯礬二錢生礬一錢硫黃二錢樟腦一錢共為末用大楓子油或豬板油調搽能治痛癢膿窠肥瘡又方苦參一兩六錢雄黃末一兩六錢煙膠三兩枯礬木鱉子川椒大楓子蛇床子樟腦硫黃明礬水銀輕粉各二兩白信五錢熱豬油調搽能治一切多癢少疼乾溼諸瘡又方水銀輕粉潮腦各一錢大楓子肉十個杏仁一粒去皮尖蛇床子一錢共研末用桕燭油調勻搽擦乾疥腫癢神效又方白胡椒殼枯礬豬油同搗擦又方大楓油水銀明礬燭油共搗勻搽名殺癢散又方用白茅藤汁擦之又方鍾莧菜煎湯浴之又方山芥菜煎湯浴之又方用千里馬更妙又方雞子黃七個人發一團熬油調赤石脂末搽之三仙丹雄黃一錢胡椒八分硫黃一錢共研細末香油調過一夜取油調擦能治膿窠瘡疥又方加升底名四仙丹治同疥瘡搽藥方白薇三錢白芷二錢炒花椒二錢細茶葉二錢寒水石二錢大黃五錢明礬五錢蛇床子一錢雄黃一錢百部二錢潮腦一錢共為細末用生臘豬油和勻搗爛擦仙拈散寒水石三兩飛滑石三兩二味同研蛇床子四兩炙鱉甲五兩地膚子四兩東白薇四兩香白芷三兩大黃五兩白蘚皮三錢百部三兩樟腦二兩研極細末麻油調搽能治男女遠年風濕皮瘡寒濕浸淫流水發癢搔之疼痛兩腿肌膚黑腫似潰非潰時或烘熱麻木等症膿窠瘡方黃柏片二錢硫黃一錢五分雄黃煨石膏海螵蛸各二錢輕粉五分共為細末麻油調搽膿窠瘡疥蜈蚣全蠍雄黃明礬緑柳樹根真潮腦白砒花椒豬油共搗勻以火紙捲成筒燒取油搽之神效癢瘡初起方五倍子大者一斤逐個鑽一小孔緑礬不拘多少裝五倍子滿為度二味用粗紙包好火灰中煨存性研細每藥二兩配入大楓子肉一兩小升底一兩共研極細以豬板油搗擦或用麻油亦可瘡疥方大楓子肉三錢蛇床子一錢花椒一錢雄黃三錢樟腦一分硫黃五錢明礬一錢水銀四錢醃豬油七錢研和搽之卷瘡散松香一錢水銀二錢硫黃二錢枯礬二錢樟腦一錢松香水銀先研再同餘三味用麻油和成丸每取此丸在脈上㨰揩凡一切痛癢諸瘡自能痊愈又方用大楓子油二兩蛇床子二兩淡底川椒雄黃枯礬樟腦各一兩狗油搗成丸一切瘡疥膿窠痛癢諸瘡方大赤練蛇頭一個瓦上煆存性蜈蚣三條枯礬一錢五分砒一錢大楓子十個川椒一錢五分雄黃一錢五分白蠟一錢以上先研細和勻醃豬油三兩肚上全網油二張燭油不拘多少法用銀封紙一張將藥末同醃豬油燭油共搗勻在內再將豬網油包在外如作筒式鐵箝夾好火上燒著下置瓷瓶承其油待凝取擦又方蜈蚣二十條全蠍十個大楓子七個蛇床子五個輕粉一錢水銀一錢斑蝥五個麻黃二錢雄黃三錢明礬二錢花椒一錢茶葉一撮共研極細末生豬油調擦癢瘡神墨土硫黃一斤東丹水銀白信白礬各一兩共為末鍋內同熔化勻傾淨青石上結成罐片香油磨搽揚州妙積寺僧做成錠如鼠屎計重一錢每價紋銀五分即此方也一上散蛇床子一兩炒貫衆一兩白膠香一兩寒水石一兩枯礬五錢川黃連五錢雄黃三錢五分硫黃三錢吳茱萸三錢斑蝥十四個去足翅共為末臘豬油或香油調擦先以蒼耳煎湯洗去痂掌中擦藥令熱鼻中嗅二三次擦之能治疥癬痛癢瘡賽金黃硫黃四兩五錢白砒一兩火硝二兩明礬五錢雄黃一錢五分樟腦一錢五分共研為細末入銅杓內慢火熔化攪勻以醋噴地然後傾藥於地如澆湯狀結成一片收貯膿窠癢痛瘡用香油或豬油磨搽癬瘡先以土大黃打爛擦破用火酒搽擦能效水銀膏大楓子肉一兩杏仁一兩去尖皮輕粉二錢水銀二錢枯礬五錢共為末用桕油三兩調搽凡芥癬爛風等瘡三日即愈如加雄黃更妙一擦無蹤上血竭一錢硫黃五分腰黃五分明礬五分共為細末用青布卷藥作筒浸真菜油內令透箝火上燒著瓷盆盛油待凝取擦能治疥癬肥瘡合掌散硫黃一兩鐵鏽一錢紅砒六分共研極細如面取蔥汁調和之搽入大碗內勿使厚薄以碗覆瓦上為度取艾置碗下熏藥至干敲碗內與碗同聲為度取藥研細能治癩疥陰囊癢藥一錢敷數次全愈椒礬散白占一錢桕油燭一對明礬一錢川椒一錢水銀一錢共研搽擦能治諸瘡掃盡曹家百萬兵大楓子肉二兩枯礬四兩樟腦三錢蛇蛻五分燒存性蜂房五個燒存性共為末入桕油四兩水銀五錢同搗成膏能治膿窠黃水癢痛疥癬諸瘡疥靈丹硫黃水銀各一錢油核桃肉一兩生豬板油一兩共搗如泥聞臭及擦患處能治疥瘡二妙丹吳茱萸焙硫黃等分研末凡膿疥間雜者人手心合掌摩擦每日二次三四日全愈五虎下西川大楓肉末蛇床子末各五錢枯礬末一錢水銀二錢白鍋一錢先將鍋化開次入水銀再入三味柏油或桕油搗極勻搽瘡宜幹些臘豬油搗亦可能治血風癬蟲坐板疥癩諸瘡不傳妙方緑柳樹根皮川椒二味等分炒燥取淨末四兩枯礬一兩全蠍五隻焙共為細末豬板油調搽松黃散專治腿上濕瘡雄黃六錢川柏一兩五錢炒蛇床子一兩炒川椒輕粉水銀各二錢共末密陀僧四兩硫黃三錢明礬一錢二分煙膠九錢松香一兩三錢研末法用蔥三兩搗汁拌熬煬入陰水內取起再拌入水取起三次為度共研極細專治腿上濕瘡紅紫流水奇癢久不得愈並治一切疥癬諸瘡濕瘡用桐油調敷諸瘡用木鱉子煎菜油調搽如膿窠瘡方中去水銀又方黃丹一兩水飛炒紫鉛粉一兩白龍骨一兩煆松香一兩二錢如前法制共為細末麻油調敷專治肥瘡生髮中黃水瘡生周身坐板瘡生臀上等症二妙散茅山蒼朮一斤川黃柏一斤共炒存性研末麻油調治濕風爛瘡清涼散輕粉杭粉蛤粉各一錢青黛五分煨石膏三錢六一散三錢共研細末天疱瘡用絲瓜汁調搽或葉亦可發火丹用火丹草搗汁調搽余濕火瘡等俱用麻油調搽附慢驚吊心窩法胡椒七粒生梔子七個蔥白頭七個白散面一撮上各研和勻用雞蛋白半個調攤青布上貼小孩心窩日夜取去有青布黑色即愈如不愈再照前法貼之
