body:
  text: 卷四臁瘡部夾紙膏冰片二分麝香一分銅緑五分輕粉五分水銀二分共研至不見水銀星為度再用黃占五錢雄黃豬板油一兩共熬勻入前藥搗成膏隔紙攤貼好多刺針孔貼之又方龍骨四錢銅青八錢制甘石六錢黃連汁淬黃柏六錢制茅朮六錢左牡蠣二兩煆鉛粉八錢黃丹八錢冰片二分生豬板油搗成膏又方龍骨五錢沒藥二錢去油明礬一錢象皮河泥炒如無可不用冰片一錢石膏五錢男人不用制甘石三錢共為細末用豬油熬熱搗成膏隔紙攤貼用布綁緊又方去油乳香三錢銅青八錢冰片一分黃占三錢白占三錢各為細末先將菜油四兩雞蛋四枚同熬枯去渣將二占熔入次入乳青二味後入冰片傾候冷攪成膏罐貯勿令泄氣隔紙攤貼膏藥之外須綿花裹腳布包好亦不可泄氣兩周時一換如不收口用生肌散摻之凡一切遠年近時爛腿十日之內包好永不再發又方雞子黃二十個同男子發熬取油約半杯麻油一酒杯同發熬白占黃占各一兩五錢血餘炭一錢為末輕粉一錢為末先將麻油熬清投入黃白二占離火攪不住手加入雞子油再攪待稍冷下餘三味和成膏又方桐油二兩白占四兩兒茶輕粉松香各二錢銅青一錢冰片三分先將桐油白占略熬不可太老再下余藥調成膏舊傘紙做夾紙膏貼多刺針孔三日一換須先用當歸蒼朮煎湯洗淨患處然後貼膏所貼過之膏不可棄露天又方海螵蛸頭髮灰水龍骨即舊船底石灰輕粉等分桐油調做夾紙膏貼之又方兒茶黃丹胡粉水龍骨粉霜龍骨白蠟黃柏豬膽汁炙共為末豬油搗成膏隔紙膏明礬胡椒川椒皮硝准鹽磚用火煆透白占等分共為細末用青油燭調油紙上貼之須令忍痛又方先將麻油三兩煉穿山甲一錢煆末再下白占五錢五分化勻又下煆陀僧末五分飛黃丹一錢和勻取起臨用以油紙攤上夾紙一層多刺針孔先用楝樹根煎湯洗淨患處然後貼上外用薄絹一層扎緊十日即愈如爛腳亦可將前法洗淨貼之數日即愈又方龜板炙研醋煆爐甘石各三錢輕粉二錢冰片三分共研細末用麻油半酒杯銅杓內熬滾再入黃占二錢熔化離火待凝入前藥末攪勻先以蔥椒甘草湯洗淨患處油紙做夾紙攤貼白玉膏白龍骨煨石膏制甘石鉛粉等分豬油成膏又方人中白一錢五分寒水石一錢冰片五釐枯礬八分赤石脂一錢白者更妙另煆海螵蛸一錢白占三分麻油五錢先將麻油熬清次下占熔化後下余藥攪成膏又方爐甘石一兩火煆豬膽汁淬七日海螵蛸一錢白占五錢枯礬一錢或五六分多則作痛用豬板油搗成膏又方乳香沒藥各去油象皮各五錢為末白占五錢鉛粉研細黃占密陀僧各二兩為末輕粉四錢上上真桐油一斤入銅鍋內熬至無沫澄清先入陀僧末攪勻取起入二占濃化攪勻俟油溫放入五種藥末攪勻以大綿紙攤上陰乾隨瘡大小剪貼遠年定效金華散煨石膏八兩生石膏八兩飛血丹一兩共為細末乾者香油調敷濕者乾摻專治男女新久爛腿臁瘡及一切癰癤瘡毒用之且能去腐生肌臁瘡拔毒方瀝青四兩礬紅二兩共為細末香油調搽須忍痛則瘡內出其毒可拔毒水盡再用收口藥並治坐板流膿瘡臁瘡收口方冰片三分石決明二錢煆川連一錢血竭五分琥珀末一錢寒水石三錢煆乳香一錢去油黃柏末五錢共為細末如癢甚者加飛礬五分凡毒盡後瘡不起邊肉有紅色先將溫苦茶洗一次敷藥一次不數日收口並治諸毒瘡不斂臁瘡阡張膏香油四飯碗亂頭髮四兩杉木皮三兩燒灰研末白占二兩麝香五分研細先將香油熬將熟入發熬化次下杉木灰白占熔化後將余藥投入滾化攪勻以阡張紙入油內收盡為度貼三日翻一面七日全愈無論遠近爛見骨者半月收功臁瘡收口方象皮七錢血竭二錢龍骨五錢冰片一錢乳香二錢沒藥二錢海螵蛸一錢共為細末摻爛腿臁瘡方象皮八寶丹冰片爐甘石各等分共研細先以蔥湯洗淨患處然後摻藥誓不傳方荊芥一兩防風一兩川柏一兩陀僧五錢銅緑五錢共為細末先用水銀三錢萆麻子十粒同研至不見星為度用桐油煎數沸入前藥用油紙看瘡大小攤膏摺好刺孔千下用米泔洗淨患處貼之一日換一轉收膏擦淨不拘遠近爛腿數次即效獨聖散水龍骨炒乾為末麻油調敷治臁瘡並治婦人裙鞭瘡恙癬瘡部祕製癬瘡藥靈丹鮮白槿皮一兩二錢土槿皮六錢白芨四兩冬朮六錢斑蝥一錢檳榔四錢大楓子油四錢川椒三錢番木鱉四錢共為粗末好滴花燒酒浸一月取酒搽擦專治風濕內郁陽分變生癬癩汗斑並治腳縫濕癢一切風濕遠年坐板癢瘡等症其效如神又方生大黃皮硝荔枝核等分為末米醋調搽牛皮頑癬加舊牛皮灰銅錢癬加古錢灰荷葉癬加荷葉灰又方土槿皮二錢雄黃檳榔各一錢斑蝥四隻輕粉一分五釐樟冰一分各研細火酒浸搽遍身頑癬川槿皮一兩牙皂五錢大楓子肉三錢米醋一碗共煎至半碗去渣澄清入明礬五錢研細皮硝五錢研細又煎至一小杯和入土大黃根自然汁一小杯先以穿山甲刮微破將筆蘸搽數日即愈癬藥酒海風藤土大黃根白果肉各五錢白芷白芨各三錢檳榔五錢斑蝥七隻鮮金錢松根皮一兩雄黃三錢滴花燒酒半斤浸藥七日後凡遠年牛皮蛇皮一切頑陰癬以酒搽患處五七遍自愈又方槿樹皮一錢生南星五錢檳榔一錢樟腦五分番木鱉五分蟾酥三分斑蝥三隻用火酒浸擦治癬神效方硫黃五兩紅礬四兩火酒四兩先將硫黃入銅杓內化開用酒煮乾與紅礬同研細末米醋調搽或先用穿山甲刮微破一楊梅癬前藥加粉霜四分如前法擦一狗疥癬前藥加入木鱉三分一牛皮癬前藥加白砒四分一頑癬前藥加輕粉二錢一乳癬前藥加松香二錢一荷葉癬前藥加枯礬二錢一雞皮癬前藥加輕粉二錢同大黃搗爛以麻布包之蘸前藥擦之一白風癬前藥加藥皮硝二錢又方白芨白蘞檳榔土槿皮各二錢輕粉一錢火酒浸擦又方松樹根皮四兩海桐皮白蘚皮白檳榔雷丸各三兩斑蝥四十九下身加倍共為末醋水對調隔一夜用筆蘸搽一日三次七日全愈又方土大黃根三錢蚯蚓糞三錢雷公藤五分大楓子肉一錢五分防風一錢五分山槿皮三錢共為末陳醋調搽痔瘡部外痔搽藥頂大五倍子十個鑽孔去子金頭蜈蚣三條碎兒茶研一兩五錢將二味裝入倍子內用銀紙封固瓦上煆以青煙盡取起研末配熊膽一錢冰片五分再研極細先用皮硝泡湯洗痔後以豬汁調搽追管丸薑汁炒胡黃連一兩炙刺蝟皮一兩當門子二分共為末飯和丸如麻子大每服一錢食前酒下專治痔漏不拘遠近服後管內膿水反多是藥力到也膿水追盡服後消管丸自能奏效不必疑忌消管丸胡黃連二兩炒炒甲片一兩石決明一兩煆炒槐米一兩各取淨末稱准和勻煉蜜丸如麻子大每服一錢早晚二次米湯下至重者四十日全愈再服完善丸如四邊瘡口有硬肉突出可加蠶繭二十個炒研和入藥內閉管丸即完善丸夏枯草十兩連翹殼五兩甘草節五錢金銀花四兩共炒為末淨銀花一斤煎濃汁和丸如緑豆大每服三錢空心淡鹽湯下若起漏三五年兩服全愈一二年者一料即愈外痔搽藥寒水石四兩研極細末大蜒蚰百個同搗極爛陰乾再搗千餘下如香灰樣收貯臨用每末二錢配冰片一分和勻以蚌水調搽或豬膽汁攙入真麻油亦可初起者半月愈年久者一月斷根若痔內出血配入蒲黃三四分外洗用瓦花枳殼煎湯治痔神棗散頂大南棗一枚去核真銅緑須銅上刮下者不拘多少鱉頭一個煮取淨骨打碎將銅緑鱉骨填滿棗內將棗合緊線扎煆存性為末先將秋海棠根葉煎湯洗瘡後用清水調敷洗痔極效方蔥白十個瓦花一兩馬牙莧五錢皮硝五錢五倍子五錢槐花五錢茄根五個花椒五錢煎湯頻洗又方爛石榴三隻五倍子五錢烏梅七個槐米五錢地骨皮五錢煎湯痔漏插藥百草霜黃連各二錢五分冰片五分麝香五分旱蓮草頭炒蜣螂蟲各五錢螞蝗五條瓦上炒焦研細為末丸如粟米大納入管內三日後管即化出用輕粉乳香麝香韶粉東丹血竭末摻之收功痔瘡化管方田雞皮炙灰血餘炭黃明膠牡蠣拌炒研末每朝三錢沖服痔漏插藥小茴香一兩白芷三兩白礬一兩研細銅杓內熔成餅再入炭火上煆令煙盡取出出火毒為細末用麵糊成條插入漏內直透至痛處為止每日三次七日為止十餘日結痂而愈如結只一孔十日全愈洗痔瘡方遍地香過冬青鳳尾草各一種俱要鮮煎湯熏洗二三次即好如無鮮者乾者亦可痔漏精方烏梅肉半斤韭菜地蚯蚓七條瓦上焙燥陳倉老米八合研細飲和丸夜露早收每晨開水下每服三錢不論久遠一料除根枯痔散明礬一兩白砒三錢共研細入陽城罐內外圍炭火煉至煙起煙即砒毒人不可聞俟煙盡礬枯去炭次日取研至無聲為度四圍搽之不可使藥流入中孔致令大痛神散元珍丹明礬煆熟存性不碎如緑豆大以桂圓肉包之日服一粒雖重症服之百日斷根治痔以手搓之又方透明白礬一斤搗如豆大入罐內如前法煉至礬笑罐外而枯其頂如痔形者即靈藥成也出火毒研極細或頂大雪梅片一二釐取津吐調於手心搽痔上不可多搽再取竹白衣作膏藥式糊痔上數次即愈其靈藥底可合一切藥又方紅砒不拘多少瓦上煆至白煙盡為度飛白礬各一錢烏梅肉二錢燒存性共研極細用時以津吐濕手指蘸藥於痔頭痔身搓捻一日二次初敷不腫五六日出臭如出盡其痔乾枯此藥不用一方加白靈丹五分靈祕丹藥片腦一分朴硝五分熊膽二分蝸牛一兩螺肉一兩橄欖炭五錢搗爛水浸一夜取水並藥敷痔上胎元七味丸頭胎男子臍帶三個瓦上焙存性陳棕炭七錢京牛黃三分槐米二錢刺蝟皮三錢象皮四錢地榆三錢共研酥油糯米糊丸如蠶豆大每服七丸空心白滾湯下專治痔漏三日化管七日平滿血清膿止十日除根眼痔用五倍子燒灰麻油調搽口牙部牙疳方川柏三錢寒水石三錢黃丹一錢千層蚌殼一錢人中白三錢梅冰片一分共研細末牙疳回疳散真人中白五分煆陳蠶繭二錢五分煆存性五倍子一錢打碎去蠱制明礬法用整五倍子一錢內裝明礬一錢煆枯研細末用川連末五分蘆薈末五分犀牛黃三分青黛五分冰片四分蟢子窠十七個煆存性共為細末先用河蚌煎湯漱口用少許吹之砒棗散紅棗三枚法每個去核入紅砒黃豆大一粒扎好炭火上煆盡白煙為度出火氣共為細末再入之以人中白煆五分冰片五釐蘆薈三分共為細末擦之專治走馬牙疳人龍散戌腹糧即狗屎中骨頭瓦上煆存性為末每一錢加冰片少許敷之能治牙疳之疾又方人龍瓦上焙為研極細末加青黛冰片少許和搽治同龍虛止疳散屋上白貓屎煨石膏等分研末加入蛔蟲一條炙灰冰片少許共研極細吹之專治痘後牙疳極凶危者及走馬牙疳吹之神效再服清火解毒之劑又方緑礬一錢炒紅煨石膏三錢兒茶一錢月石一錢人中白一錢冰片二分人中黃一錢研細吹之立效牙痛方薄荷尖五分蓽茇五分月石三分黃丹五分梅片三分樟腦五分青鹽五分骨碎補去毛皮曬乾五分麝香一分共為細末擦又方生石膏一錢細辛一錢兒茶五分川連一錢冰片二分共為極細末擦之無論實火虛火蟲蛀疼痛俱可以治如虛疼加人參末三分蟲蛆加樟腦五分牙痛方蟾酥一錢陳酒化透五靈脂一錢麝香一錢研和為丸均丸二百粒新零綢包絲線扎固裝瓷瓶內每遇風火蟲疼牙痛取一丸咬於患處丸化自愈牙痛方蓽茇一錢川椒五分石膏五分青鹽四分共為細末點於痛處立止一笑散初平方去火硝加蓽茇等分青鹽火硝硼砂樟腦各等分研細擦