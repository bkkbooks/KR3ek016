摻患處肺風瘡蜈蚣一條焙雄黃一錢硫黃一錢共為細末夏月用白茄子搗汁調搽冬月用桕油杵膏搽之臨臥搽上次早洗去半月全愈纏腰火丹方挑瞎蛇頭上眼用坑缸上舊箍炙炭為末麻油調搽又方蛇蛻燒存性坑廁上浮泥同研用童便調敷金甲散穿山甲一隻全者生漆一斤每日將山甲漆數次漆完用瓦器將山甲炙灰如病人要頭身先好即服川山甲頭身起一錢足先好即服穿山甲足四隻起對陳酒服完即愈如山甲有一不全病人亦缺一不全為專治大麻風仙方地耳散地踏菜曬乾為末豬油調敷治湯泡傷又方泡過爛茶葉藏甏內取抹並治火傷又方秋葵花手未捏過浸麻油如遇湯火傷者取油搽之黃水禿瘡方嫩松黃蔥制過二兩黃丹一兩無名異一錢炒鉛粉一錢輕粉三分共研末先以米泔洗淨患處用香油調敷𤺪疒貢頭方用化銅舊罐研細末加輕粉冰片少許香油調搽神效手足雞眼方用大蜈蚣幹一對炙研細摻膏藥上貼之一周時即化黃水又方蜈蚣一錢硇砂一錢白礬少許用麻油浸埋地下一日取出點之凍瘃方白芨研末用蘿蔔一個挖空入桕油於內蒸透取油調搽又方舊泥盒燒灰研細油調搽凍瘡湯火瘡方用煆瓦楞子研極細末加冰片少許麻油調敷天蛇頭方用豬膽一枚入全蜈蚣一條研末雄黃少許套上即瘥羊鬚瘡方旋覆花一錢焙舊綿絮胎一兩燒存性共研末麻油調搽損傷方當歸二錢丁香五分枳殼二錢川芎二錢辰砂五分沉香一錢乳香二錢木香二錢蘇木二錢川烏五分桂枝二錢牛膝二錢血竭一錢五分肉桂一錢杜仲二錢麝香三分參三七一錢草烏五分共研細末和勻用好酒沖服懸梁死急救法吊死者切不可剪斷繩帶先用軟泥將人糞門封好若女子封好陰戶糞門兩處將人慢慢放下落地用細辛一分牙皂一分共研極細末用蔥管吹入鼻中候其喉中有聲此藥吹完再用九死還魂草三錢飛淨真辰砂一錢將水煎濃吹耳鼻候其面紅再用生薑汁一杯飲下蓋被出汗再服米泔水一杯即愈九龍神咒丹專治跌打瘋氣立效神方纍試纍愈川烏三錢草烏三錢硃砂二錢硼砂六分梅片二分原香二分丁香二分硫黃六分以上八味各研極細末用黃表紙硃筆書九龍字符九張用銅鍋一隻洗淨用新布三塊揩乾又備新竹板一片炒藥用的先將爐炭加好聽用將鍋先焚龍字符一張再燒龍字符一張亦焚在鍋內將川烏放下再燒龍字符一張將草烏放下炒余皆仿此次第龍字符藥味均炒至硫黃入鍋溶化即倒干瓷盆內薄薄攤開均分作三四盆候冷冰成片塊瓷瓶收貯切勿泄氣如遇患病用筷一隻頻點點至痛處用老薑一薄片姜上置藥一塊如黃豆大用明火燒藥燃著忍痛候藥性燒盡為度再點仍燒以不痛為止即愈試驗無算用硃筆書龍字樣一口氣書一張不可二口氣為要為要桃花散即刀傷藥千年石灰二兩生大黃六錢共炒黃同研極細末敷患處即效瘋氣藥酒方鑽地風宣木瓜漢防己秦艽野桑梗川羌活粒紅花千年健當歸以上九味各四錢加南棗二十枚冰糖二兩陳酒四斤外用大瓦瓶一隻將藥連酒浸入瓶內對口隔水煮滾點一炷香緩緩再滾香盡藥好每日清晨隨量飲之再滾二次如不見效再服一劑即愈下疳方橄欖灰四錢大梅片二分紅小升四錢如自生用菜油調敷斫喪用麻油調無論乾溼先須干撒一次再調塗如法武定侯府方治楊梅結毒瘡輕粉一錢杏仁三十粒去皮雄黃一錢半冰片少許共為末先以甘草湯洗淨用雄豬膽汁調藥搽上二三日即愈百發百中赤白瀉痢神方干桑椹三兩雄精一兩五錢赤白沙糖各三兩砂仁三兩上藥研細用囫圇荸薺三斤原燒酒三斤浸入大沙鍋內蓋好不泄氣用菜油燈心文火煎滾收貯臨服荸薺一枚即愈即此藥渣藥酒服之亦無不愈其效如神廣瘡方輕粉三錢大黑棗二十枚法將大棗去核輕粉研細同河泥少許嵌入棗內用厚麵糊裹勿可泄氣炭火炙成炭每服兩棗分三日用黃酒化送神驗化毒五虎丹炙牛角炙羊角炙甲片各二錢角刺三錢生大黃十二兩法以牛羊甲片三味濕紙包煨焦取淨末同角刺大黃淨末研勻每服五錢弱者三錢紹酒送下候瀉宜於空地上利完將土掩之恐惡氣害人間二日再一服甚者不過三服神效後服珠黃十寶丹以愈為度結毒亦效珠黃十寶丹滴乳石人乳煆真琥珀乳香去油沒藥去油辰砂水飛山茨菰各三錢敗龜板炙雄黃各四錢犀角珍珠各一錢真正人中黃五錢當門子五分各取淨末稱准共為極細末山藥打糊為丸如桐子大辰砂為衣專治一切廣瘡楊梅結毒下疳潰爛小兒胎毒分一月服完即愈甚者再服一料必愈功勝五寶丹以上三方即治楊梅瘡方玉樞丹方毛慈菰二兩曬紅芽大戟一兩五錢炒千金子霜一兩冰片三錢文蛤二兩去垢曬雄黃三錢飛辰砂三錢麝香三錢草河車一兩五錢曬山豆根一兩炒丁香三兩曬燈草炭一錢以上藥各研末和勻糯米飯打成錠曬乾收貯重出絶癇丹治顛仆眼直口吐痰沫或作羊鳴不省人事此因驚恐得之硝煆礞石五錢天竹黃六錢當門子二分煨明天麻三錢辰州硃砂三錢蛇含石五錢醋煆陳膽星四錢法半夏八錢等分為末以薑汁五錢竹瀝二兩和於蜜中煉熟杵丸如龍眼大童便磨服半丸立止服三一丸全愈蛇蛻四分煆淨緑礬二分犀黃四分石膏三錢煨紫草二錢川連一錢蜂窠一錢煆淨紫荊皮一錢五分上味同研細末用馬蘭汁調藥塗於患處
