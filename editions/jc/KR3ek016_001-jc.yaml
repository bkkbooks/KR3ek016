body:
  text: 卷一升降部大紅升辰州大劈砂五錢明雄黃五錢水銀一兩火硝四兩白礬一兩皂礬六錢先將二礬火硝研碎入大銅杓內加火酒一杯燉化一干即起研細另將汞朱雄研細至不見星為度再入硝礬末研勻先將陽城罐用紙筋泥搪指厚陰乾常輕輕撲之不使生裂紋搪泥罐子泥亦可用如有裂紋以罐子泥補之極干再曬無裂紋方入前藥在內罐口以鐵油盞蓋定加鐵梁盞上下用鐵台水鐵絲紮緊用綿紙捻條護密周圍塞罐口縫間外用熟石羔細末醋調封固盞上加炭火二塊使盞熱罐口封固易干也用大釘三根釘放地下將罐下放釘上罐底下置壑大炭火一塊外砌百眼爐升三炷香第一炷香惟用底火如火大則汞先飛上二炷香用大半罐火以筆蘸水擦盡三炷香火平罐口用扇扇之頻用水擦盡弗令乾干則汞先飛上三炷香完去火冷定開看方氣足盞上約六七錢刮下研細瓷罐盛用再預以鹽滷汁調罐子稀泥用筆蘸泥水埽罐口周圍勿令泄氣蓋恐有綠煙起汞走也綠煙一走即無用矣此丹治一切瘡瘍潰後拔毒去腐生肌長肉瘡口堅硬肉黯紫黑用丹少許雞翎埽上立刻紅活瘍醫若無紅白二丹決難立刻取效大白升水銀枯皂礬焰硝食鹽各一兩共研至水銀不見星為度入陽城罐內口上一鐵油盞蓋之鐵絲紮緊鐵盞四圍用白綿絲條箝緊外用鹽五兩光粉和泥搗勻擦罐入百眼爐內初用文火一炷香盞上常以微水潤之至三炷香用武火完為度俟冷定打開取升在盞上色白者刮下研細盛用此丹可服可敷如瘡口有黃水用此無水用紅粉霜一方加硼砂黃丹硃砂膽礬雄黃附封罐口神膠方破砂罐末草鞋灰黃泥傾銀藥末燒鹽粽子各一兩共研細末用鹽滷調和膠丹入乳缽擂細用抿子挑封罐口小紅升真水銀二兩淨明礬二兩提淨火硝二兩上三味搗和研勻安鐵耳鍋內蓋以高深宮碗居中平穩用煨石膏研細揪滿碗𪣟用圍平鍋口封好放於風爐上以先文後武之火煉三炷香為度過夜待冷以刀刮去封口石膏輕輕𫼘抹碗𪣟將碗揭起用小刀刮下升丹或綠或黃或紅各自貯開瓷瓶盛之聽用顏色雖殊功效則一陳一年者出盡火氣愈陳愈佳此藥治一切瘡瘍疔腫癤各毒初起出膿時用此摻瘡口自能呼膿拔毒外用膏藥蓋之如膿腐去淨者另用生肌長肉粉霜如男子腎囊女子乳頭及眼珠上下兩角或生瘡毒切勿用此丹恐受水銀之氣受患莫測慎之六仙升丹水銀三兩火硝三兩明礬五兩東丹四兩輕粉六錢皂礬一兩五錢如紅升法白降丹即夏冰對配丹水銀淨火硝白礬皂礬炒白鹽各九錢上五味共研至不見水銀星為度盛於新大傾銀罐內以微火熔化火急則水銀上升走爐須用烰炭為妙熬至罐上無白煙起再以竹木枝撥之無藥屑撥起為度則藥吸於罐底謂之結胎胎成用大木盆一個盛水水內置淨鐵火盆一個以水盆內水及鐵盆之半腰為度然後將前結就之胎連罐覆於鐵盆內之居中以鹽滷和黃土封固罐口勿令出氣出氣即走爐再用淨灰鋪於鐵盆內灰及罐腰將灰按平不可搖動藥罐恐傷封口即要走爐鋪灰畢取燒紅慄炭攢圍罐底用扇微扇煉一炷香謂之文火再略重扇煉一炷香謂之武火炭隨少隨添勿令間斷而見罐底再煉一炷香即退火待次日盆炭冷定用帚埽去盆灰並將封口上去淨開罐鐵盆內所有白霜即謂之丹將瓷瓶收貯待用愈陳愈佳其罐內原胎研摻癬瘡神效若恐胎結不老罐覆盆內一遇火煉胎落鐵盆便無丹降亦為走爐一法用鐵絲扎作三腳小架頂爐內撐住丹胎最為穩妥此丹如遇癰疽發背毒一切惡毒用一釐許以津唾調點毒頂上以膏藥蓋之次日毒根盡拔於毒頂上頂上結成黑肉一塊三四日即脫落再用升藥敷此即收功此丹用蒸粉糕以水少潤共和極勻為細條曬乾收竹筒內各為錠子凡毒成管即約量管之深淺插入錠子上蓋膏藥次日擠膿如此一二次其管即化為膿管盡再上升藥數次即收功此丹比升丹功速十倍但性最烈點毒甚痛法用生半夏對攙再加冰片少許一方加辰砂二錢雄黃二錢硼砂五錢水銀用一兩餘四味各用一兩五錢大白降水銀一兩青鹽二兩皂礬二兩火硝二兩五錢滷砂三錢雄黃三錢辰砂三錢白砒五分明礬二兩上藥共研勻放陽城罐內微火煨乾後如前法降三炷香候冷取藥不可被生人雞犬衝破此丹凡腫毒未成名件者用醋調點患處頭上看毒大小如桐子大疱起毒即消若已成不肯穿者亦用此丸將膏藥貼頭上半日即穿小白降水銀火硝生礬各五分食鹽二分上共研末入傾銀罐內放炭火上文火煎滾滾至邊上起焦黃色候至滿面俱焦黃米色為度將罐離火候冷再用圓正擂盆一個裹面須揀光細者將銀罐連藥輕輕倒合在擂盆內罐口與擂盆縫間須用綿紙條墨水潤濕加鹽泥封固然後將擂盆坐於大水盆中罐底先加文火用扇扇之先文後武煆至五寸線香為度退去炭火候冷先埽去罐口外鹽泥然後開罐取降於擂盆底內之藥藥色以潔白如霜者為上若青黃黑色不可用或以銀簪腳與磨亮刀頭略沾微唾蘸藥在上即刻起鏽者為佳用時用新綿花蘸藥敲些許於膏藥上比升藥更要少些貼後兩杯熱茶時即發痛半日即止毒重者每日一換膏毒輕者貼兩三日亦不妨若貼大腫毒上膏先放些麝香阿魏然後上此藥少許貼之若要做咬頭膏藥代針丸將麵糊以竹片拌和做成細條切作芝麻粒大小放膏心中對腫頭貼之此藥不可沾在指頭上沾則要疼痛發疱退皮此藥陳久者少痛性和緩卻要多用些如第一次降完藥色不白可將罐內之藥刮淨此藥無所用處只將降於擂盆底內之藥刮出另將水銀火硝生礬各五分食鹽二分並將擂盆內降不透之藥與四味一併研和從新再入銀罐照依前法降之此藥若一次降不如法不妨兩次三次連降即降至十數次方能降好計算已有水銀五錢在內矣每次只將銀罐刷淨或另換新罐每次只要用水銀火硝生礬各五分食鹽二分直降到好方止初起煎時須要火候得法若火候不及則罐中結胎尚嫩水銀尚活倒合轉來非連胎墜入擂盆底內即活水銀先流入擂盆底中若火候太過結胎太老非水銀先已飛去即有降不下之病總以結胎不嫩不老為度用烰炭火最得法凡瘡毒已穿破用水煉降藥法新煉出白降丹研細用元色緞五寸將降藥篩勻緞上卷緊以麻線捆紮極緊放瓦銚內清水煮約一伏時內換水三次將緞先取起掛風處陰乾然後打開以雞翎埽下收貯瓷瓶用之並不痛楚一降水銀六錢硃砂二錢雄黃二錢硼砂二錢甘草水煮硝一兩綠豆煮白砒一錢青鹽三錢制明礬一兩食鹽一兩共研末用陽城罐裝藥在內用火熔化結硬再將新茶杯合在罐口上四圍泥固用銅杓一個邊上畫後天八卦圖內放水六七分將茶杯放在水內陽城罐底朝上四面以瓦合好上放梗炭文武火煉三炷香為度去火候冷開看茶杯內藥有七八錢重刮下研末同二降再煉二降水銀一錢硃砂一錢雄黃一錢五分硼砂二錢五分火硝一兩二錢明礬二兩皂礬二兩食鹽一兩二錢同前煉過藥共和為末同前煉法煉完再同後煉三降硼砂二錢青黛四錢白砒一錢五分水銀六錢明礬六錢同前煉過丹藥共研極細同前丹煉三降靈丹俱已煉成其色雪白勿見鐵器研細加冰片五釐蟾酥五釐共研極細瓷罐收貯勿令出氣凡遇痔漏癧塊將成藥線插在毒內治一切腫毒及發背癰疽癧塊痔漏等毒以去腐生新立刻見效五色靈藥食鹽五錢黑鉛六錢枯皂礬枯白礬水銀火硝各二兩先將鹽鉛二味熔化入水銀結成砂子再入二礬火硝同炒乾研細入鉛汞再研以不見星為度入罐內鹽泥固濟封口打三炷香不可太過又及一宿取出視之其白如雪約有二兩為火候得中之靈藥如要色紫者加硫黃五錢要黃者加明雄黃五錢要紅者用黑鉛九錢水銀一兩枯白礬二兩火硝三兩辰砂四錢明雄黃三錢升煉火候俱如前法凡升打靈藥硝要炒燥礬要煆枯一方用燒酒煮乾炒燥方研入罐一法凡打出靈藥倍加石膏和勻復入新罐內打一炷香用之不痛此五色靈藥治癰疽諸瘡已潰余腐不盡新肉不生撒之最妙升打靈藥固罐法用陽城罐將罐熇熱搗大蒜於罐外遍擦之再熇再擦如是三四次再以姜醋入罐內蕩之煮之以干為度次用黃土二分煤炭二分以馬毛與鹽水合之固罐一指厚陰乾裂縫再固必要完固聽用升打靈藥封口法入藥畢蓋鐵盞用鐵絲台水畢用石膏無名異等分食鹽減半俱煆過為極細末醋調成膏次加炭火二三塊於盞內外熱以筆蘸藥周圍搽之隨干隨搽以口平為率一用石膏生白礬食鹽等分為末水調搽之如前金蟾化管丸水銀三錢明雄黃一兩以二斤火酒漸煮添酒盡為度共乳細用紙包好取大蝦蟆將藥包入於肚內去腸只留肝肺以線縫好再用銀硝一兩白礬一兩研勻入陽城罐內加水半茶鍾放火上熬令枯乾罐底取放地上再納蝦蟆於內鐵盞蓋好將鹽泥固濟升文火二炷香中火一炷香武火一炷香冷定開看盞上靈藥刮下研細用蟾酥乳化為丸如芥子大陰乾凡一切諸漏有管者雖彎曲之處用一丸放膏藥上對管口自入到底方回嫩管自化老管自退七日見效如未全退再用一丸無不除根圍藥部離宮錠真蟾酥三錢血竭三錢膽礬三錢硃砂三錢陳金墨一兩麝香一錢五分各研為細末和勻火酒化蟾酥糊成錠如筋粗寸長曬乾清茶研敷治一切無名腫毒坎宮錠陳金墨三錢熊膽三錢胡連三錢牛黃三錢冰片一錢麝香五分或加木香少許京墨一兩胡連二錢牛黃五分冰片七分麝香五分共研細末用豬膽汁加生薑大黃水浸取汁釅醋水少許和成錠冷水磨搽治陽毒紅腫赤遊丹蟾酥錠蟾酥二錢火酒化金腳蜈蚣一條膽礬一錢乳香一錢雄黃二錢麝香一錢沒藥一錢銅青一錢冰片五分寒水石二錢血竭一錢大蝸牛二十一個共制末蝸牛搗作錠每用米醋磨搽或用辰砂金箔為衣更妙治陰症疔瘡紫金錠當門子三錢一方五錢四分川五倍一兩一方六錢塊辰砂四錢一方六錢紅芽大戟一兩五錢一方六兩千金子霜一兩一方五兩山茨菇二兩一方六兩雄精三錢一方一兩上藥共為細末糯米飲搗成錠每重一錢用冷水腐化內服外敷能治陰陽諸症無不見效一方加草河車六兩驅毒散白芨一兩六錢紫花地丁八錢烏骨雞骨一兩煆硃砂一錢雄黃末一錢輕粉一錢五倍子二錢炒黃大黃二錢牙皂八分上藥共為末以醋調敷凡毒生於骨節之間能使移上移下無殘症之患銀箍散草烏生南星乳香生半夏五倍子沒藥陳綠豆粉共為末酒調搽能治陰症金箍散赤小豆一兩番木鱉二兩白芨五錢芙蓉葉二兩白蘞五錢生大黃五錢黃柏五錢共為末蔥蜜調塗治陽症又方鳳仙花子大黃五倍子各十兩人中白一兩五錢如無用皮硝代陳小粉十三兩炒黃為末醋調鐵箍散干芙蓉葉五錢薑黃五錢白芨五錢五倍子五錢白蘞五錢生大黃一兩蟹殼五斤陳小粉一兩炒黃共為細末米醋和成錠臨用醋磨搽治一切毒未潰者白圍藥天花粉三兩生南星四兩生半夏四兩一法又白蘞一兩白芨一兩白芥子二兩為細末用酸醋調塗治一切痰毒最效驗抑陰散川五倍五錢肉桂三錢麝香三分川鬱金一錢五分生南星一錢五分共為末薑蔥搗汁調敷治陽毒如意金黃散天花粉十兩川黃柏五兩薑黃五兩白芷五兩廣陳皮二兩甘草二兩蒼朮二兩南星二兩厚朴二兩石菖蒲二兩川鬱金二兩生半夏二兩共為細末或醋或蜜或水或蔥汁水調敷治癰疽發背諸般疔腫跌打損傷濕痰流注大頭時腫漆瘡火丹濕熱天疱肌膚赤腫乾溼腳氣婦女乳癰小兒丹毒外科一切頑惡腫毒無不應驗一筆消雄黃二兩麝香三兩真藤黃一兩人中白五錢辰砂二錢蟾酥一兩白芨二錢白蘞二錢共為細末用廣膠三錢熟化和成錠治癰疽發背五疔毒瘡對口搭手諸般惡瘡及一切無名腫毒初起者用醋磨搽患處立消如神陰症癰瘍圍藥紅藥子四兩如無用黃藥子代白芨一兩五錢黑狗下頦一個煆存性白蘞一兩五錢豌豆粉三錢冰片三錢乳香六錢去油硃砂三錢雄黃三錢各為細末和勻醋蜜調敷四圍用極滾熱醋蘸調並可服治外勢平而不起色黑黯其痛在肉裡者如意散生南星生大黃生半夏朴硝共為末薑汁調治痰毒滷水圍藥麝香一錢沒藥雄黃血竭各三錢蟾酥一錢五倍子一兩麻黃五錢上多用蕎麥干灰淋濃汁七八碗文武火煎至二三碗之數以前藥研極細末候冷下之復煎二三沸瓷罐藏之若遇瘡毒用新筆蘸汁周圍塗之則一切惡瘡腫痛自消一筆消大黃二兩藤黃一兩明礬五錢蟾酥五錢酒炒麝香二錢乳香沒藥各二錢上用蝸牛搗成錠醋磨圈圍又方用雄黃一兩膽礬一兩月石一兩銅青一兩皮硝一兩草烏一兩去大黃明礬乳香沒藥蝌蚪拔毒散寒水石淨皮硝川大黃等分研極細末蝌蚪不拘多少裝甏內埋入地中三月自化成水每蝌蚪水一大碗入前藥末各二兩陰乾再研勻收瓷罐內用時水調敷治一切無名大毒火毒瘟毒神效一筆鉤天南星一兩生半夏一兩白芨一兩生大黃四兩冰片一錢共為末用雄豬膽汁和成錠子北京鹽水錠馬牙硝一斤入鐵鍋內烈火燒成水次下皂礬末一兩次下黃丹一兩硃砂七錢雄黃一錢共攪極勻傾光平石上凝硬收用一一切腫毒疥癬蛇蠍蜘蛛蜈蚣咬傷夏月毒蚊蝨咬傷腫瘍疼痛用醋磨或水磨一口舌生瘡乳蛾喉風咽痛用一粒口內噙化一九種心痛點眼角三次即愈牙痛含於患處一暴發風眼火眼及老年眼沿赤爛以滾水化入杯內洗之皆良一牛馬有病以點眼角大鐵箍散生大黃二錢蒼朮一錢芙蓉葉二錢薑黃二錢天花粉川柏各二錢白芷一錢川羌活二錢毛茨菇二錢川烏一錢乳香一錢去油陳皮一錢沒藥一錢去油南星一錢雄黃一錢厚朴一錢冰片一分麝香一分共為極細末凡遇皮無二色者是為陰毒蔥汁和蜜調敷漫腫無頭用陳黃酒米醋和敷紅赤腫痛發熱用清茶調敷金不換仙方枳殼三錢六分白醜黑醜各一兩甘遂三錢麝香一錢甘草五分共為極細末摻少許於膏藥上貼之治百種無名腫毒立刻止痛未成即消已成即潰立消散雄黃一兩五錢炒甲片三兩生軍五兩芙蓉葉五錢炒五倍子五兩共為細末醋調塗患處立馬消川斑蝥去翅足米粉炒全蠍尾各十個漂淡蜈蚣三條乳香沒藥各四分蟾酥三分火酒浸化再研成膏用冰片二分麝香二分為極細末麻黃四錢熬膏為丸如桐子大辰砂為衣曬乾密貯治發背癰疽腫毒每用一丸勢大者用二三丸研細摻於膏藥上貼之如瘡未破以熱手摸百餘下次日即消如瘡已破先以薄綿紙蓋上再將膏藥貼之神效家秘金箍散當門子一兩大梅片一兩飛黃丹一兩紅銀硃一兩共研極細極勻收貯玻璃瓶中切勿泄氣臨用用淨羊毛筆蘸灑膏上貼之治一切結腫成餅成核即刻消散內消部梅花點舌丹西黃一錢月石一錢熊膽三分血竭一錢去油乳香一錢五分去油沒藥一錢五分珍珠四分蟾酥一錢葶藶一錢麝香三分冰片五分沉香五錢雄黃一錢上共為細末以人乳將酥化開和丸再加辰砂一錢金箔為衣每重三分或三四釐曬三日收貯瓷瓶聽用每臨臥時溫酒送服一二丸可消一切無名腫毒疔瘡初起一方中加白花一錢二分飛龍奪命丹真蟾酥一錢去油乳香一錢銅綠一錢輕粉一錢膽礬一錢血竭一錢辰砂一錢明礬一錢雄黃一錢冰片三分麝香三分共研細末同大蝸牛二十個搗勻和丸如綠豆大每服七丸或九丸或十一丸用蔥白三五寸病人自嚼吐於手心包藥在內用溫酒和蔥送下如人行五里汗出為度無汗再用蔥研爛裹藥服之治一切疔腫惡瘡癰疽初起時黑陷不痛或麻木不仁毒氣內攻嘔吐昏憒之症一方蟾酥丸加蜈蚣兩條一方前方加蜈蚣一錢穿山甲一錢寒水石三錢殭蠶一錢全蠍一錢角刺三分紅信二分一粒珠金穿山甲一隻重二十四兩分四足一足用米醋炙一足用松花湯炙一足用麻油炙一足用真蘇合油炙黃用真西黃三錢鏡劈砂四錢真廉珠三錢水飛麝香四錢大梅片四錢明雄黃四錢杜蟾酥一錢二分火酒化上藥擇吉日法制和研極細末以蟾酥化入再加蘇合油拌搗千遍至光亮為度為丸每重五分曬乾用臘殼護耑治一切無名腫毒癰疽發背等症每服一丸將人乳化開陳黃酒沖服暖臥避風兼治小兒驚風每丸均分二次用純鉤橘紅煎湯送下五香追毒丸老君須母丁香不見火苦丁香即香瓜蒂去油乳香去油沒藥巴豆霜廣木香炒黑牛蒡子上沉香血竭辰砂蟾酥火酒另化上各等分共為細末將所化蟾酥加陳蜜和丸如芡實大辰砂為衣每服一丸或二丸空心食前紹酒化服瀉二三次後用冷粥補之毒即消治癰疽一切無名腫毒初起壯實者宜之兼去疔瘡毒定痛如神寸金丹麝香一分乳香烏金石即石炭輕分雄黃狗寶沒藥各一錢蟾酥二錢粉霜黃蠟各三錢硼砂五錢鯉魚膽狗膽各二個陰乾金頭蜈蚣七條全用焙用頭生男兒乳一合上為細末以黃蠟乳汁熬膏和丸如綠豆大大小兒丸如芥子大每服一丸重者加至三丸以白丁香七粒研爛新汲水調送暖蓋得汗為度三次即愈治極重腫毒癰疽疔瘡四肢壯熱沉重者即噤口不開撬開化三丸灌下神效皂礬丸牙皂三錢切碎炒研細末白礬三錢生研真乾蟾酥一兩切片火酒化和丸如綠豆大麝香三分和入每服一丸以蔥白裹藥黃酒送服勢重者每日服二次此藥每次止可服一粒如服二粒恐致嘔吐慎之慎之治大毒初起疔瘡走黃黑陷昏憒嘔惡之症青龍丸番木鱉四兩米泔浸三日刮去皮毛切片曬燥麻油炒透炒甲片一兩二錢白殭蠶一兩二錢炒斷絲共為細末黃米飯搗和為丸如桐子大每服五分量人虛實酌減臨臥時按部位用引經藥煎湯送下蓋暖睡勿冒風如冒覺周身麻木抽掣發抖不必驚慌過片刻即安治一切疔瘡腫毒並跌僕閃胸傷筋攣痛貼骨癰疽男婦大小頸項瘰癧及乳串結核痰凝氣滯硬塊成毒小兒痘後癰疽初起者一二服即消已成膿者服之自能出毒不必咬頭開刀誠外科第一妙方也頭面用羌活五分川芎五分煎湯送下肩背用角刺尖五分兩臂用桂枝五分胸腹用枳殼五分兩肋用柴胡五分腰間用杜仲五分兩足膝用牛膝五分木瓜五分咽頸用桔梗五分甘草五分跌僕攣筋用紅花五分當歸五分黃酒煎湯送下紫霞丹犀黃四分雄黃二錢大黃四錢天竺黃四錢藤黃二錢九曬去酸味冰片四分兒茶二錢參三七四錢血竭二錢乳香四錢去油沒藥四錢去油麝香四分阿魏一錢用蜜化夏布收去渣除乳香沒藥藤黃阿魏外余皆忌火秤准各末和勻再研極細以阿魏蒸好和蜜搗極勻為丸每服重四分專治癰疽發背破傷風疔瘡無名腫毒跌打損傷小兒驚風等症用紹酒調服忌生冷孕婦戒投七釐散大赤練蛇一條燒灰存性研極細末勿犯鐵器米糊為丸如芥子大治一切無名腫毒諸藥不效者每服七粒重者加十四粒若平陷不痛楚者加薑黃藤黃研細醋調搽之即能奏效孕婦忌投九龍丹木香乳香沒藥兒茶血竭去油巴豆各等分共為極細末生蜜調成一塊瓷盒收貯用時旋丸如豌豆大治癰毒魚口便毒橫痃初起未成膿者每服九丸空心熱酒送瀉四五次後服薄粥一碗其瀉即止如腫甚者間日再送一服其毒自消龜蠟丹血龜板一大個用下半爿烘熱用白蠟漸漸摻上板自炙枯放泥地上出火氣研細黃酒調服至醉暖蓋取汗即愈治一切無名腫毒對口發背流注癰疽疔瘡等症八聖散天蟲二錢蜈蚣八錢斑蝥去翅足穿山甲炒巴豆霜各四錢乳香一錢五分沒藥一錢五分共為末凡魚口便毒重者每服一錢輕者每服六分酒下二服自效五虎下西川炙鱉甲一兩蜈蚣二十條瓦上焙全蠍一兩土炒天蟲一兩生軍二兩共為末凡無名腫毒痰症每服一錢小兒每服黃酒送下無不應效內護部護膜蠟礬丸白明礬四兩研細黃蠟二兩辰砂六錢水飛或加蔥花四兩更炒先將黃蠟熔化待稍冷入礬末辰砂不住手攪勻加煉白蜜七八錢和勻眾手丸如梧子如蠟凝不能丸以滾水燉之凡護膜防毒內攻如未破即消已破即合每服三四十丸白湯送下或酒送亦可一日之中服一百粒方有功始終如一服過半斤必萬全矣病已愈服之亦佳琥珀蠟礬丸黃蠟一兩明礬一兩二錢雄黃二錢二分琥珀一錢辰砂一錢一方加白蜜先將葡萄肉十枚同蠟打如泥加諸藥末搗和為丸珀末辰砂為衣凡護膜化毒每服一錢食後白湯下護心散生綠豆衣一兩五錢甘草節一兩琥珀同燈心研乳香辰砂雄黃各一錢共為末凡預防毒氣內陷每服一錢空心酒下
