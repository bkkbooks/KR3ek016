front:
  text: 序今之論醫者曰中醫善治內證西醫長於外科詢其何以知其然也則曰西醫精解剖斷截湔洗目為常事耳是言也謂目下之中醫則可謂古昔之中醫則不可蓋古之醫師類多解此扁鵲華他尤其著者試讀山西醫學雜志纂輯中西解剖病理一通當知吾言之非妄然斯妙法神技何為不傳至今日而與西人頡頏耶曰守祕而已余謂中醫之日漸陵替西醫之月異日新其因雖有種種而守祕與公開實為至大之原蓋學理以研究而愈明方劑以試用而的知設有新理長方惟知自祕不肯公布微特不能更有發明即此一端亦必終歸湮沒吾國醫界不明乎此以致古醫麻醉刳剝之術失傳於後世反使西醫後進矜炫其法撫今思昔能毋慨歟為今之計亟宜開誠布公相互研求一掃向日守祕之惡習則中華醫學庶有豸乎凌師曉五有清吳郡之名醫也學問淵博精驗宏富家藏醫書奚啻萬卷胥熟讀精思捨短取長故為人治病輒多奇效惜冗於診務乏暇著述所作僅數種耳醫學薪傳飼鶴亭集方已由哲嗣合刊流傳尚有方外奇方凌臨靈方本草害利等書未付剞劂今歲裘公有三三醫書之創刊圭思中醫外科之見拙於人長由外科佳籍鮮于流通所致奚將凌師方外奇方一書商諸裘公編入印行並綴數語以告世醫至本書所列各方實淩氏一生經驗之所萃用者自知其妙無待不佞之喋喋也民國十三祀四月沈仲圭謹序重刻序世人對於中西醫學之評判輒謂西醫擅外科中醫精內病按之實際西醫診療內病固多特過中醫之處中醫對於外科詎無捷效良方以內外科疾患衡量中西醫學之高下實至無據之談也今就簡册所載撮述數事以明中醫確有愈外症之經驗效方焉冷廬醫話卷五云同邑鄭拙言學博性喜單方言其經驗最靈者有四道光壬寅年館樂平汪軍門家糞門前腎囊後起一堅塊漸覺疼痛虛寒虛熱時作案頭有同壽録檢一方云跨馬癰初起用甘草五錢酒水各一碗煎服如方服之塊漸軟次日略出清水不數日全愈圭按跨馬癰即懸癰喜多春香城亦認粉甘草膏為此症良藥毛達可便易經驗集纏喉風祕方條下云常熟趙氏祖傳纏喉風藥甚效而方極祕惜一日趙氏子與友章甘飲詢其方不答酒次趙喉間痛不可忍乃大聲曰為求豬牙皂角來來則細搗以醋調入喉五匙嗽痰大吐痛立止余藥塗頸上干則易之其乳蛾即破而愈後章傳人頗衆圭按皂角治喉風李氏綱目亦極言其效梅氏驗方新編天虛我生辨言云先慈每年必以芙蓉花浸鹽滷中明年夏日小兒有患瘡節者敷之立愈又以初生之鼠漬菜油中患湯火傷者得此立止其痛又於梅雨時捕集蜒蝣與梅子同醃遇喉症輒應手而愈豫皆親身所曾實驗者也南京醫學報第五期包蘅村曰咸豐十一年及同治二年先父行醫香港是時港埠未闢居民猶鮮風俗強悍不受法律且好食禾蟲以故下流社會之人每患疔毒一患疔毒又不肯忌葷故走黃之症獨多先父每以芭蕉根搗汁令冷飲之雖遍體走黃者無不愈上舉四例雖病之輕重不同而收效之速則一且余所述僅四事耳若博稽方書類夫此項之紀載與良方正難屈指而計詎醫籍所記盡皆子虛烏有耶故余以為中醫外科之治療除器械消毒手術外其餘方藥正不讓泰西醫術也仲圭少習內科於王香岩夫子讀書之暇録有方外奇方凌臨靈方醫學體用等書業由吉生先生採入三三醫書行世乃者上海世界書局輯印珍本醫書集成宣揚國粹良足欽佩仲圭寢饋此道垂二十年深信中醫之效方妙藥不至廢棄故於本書重版之日再抒其管見以就正世之賢達焉民國二十五年四月下浣杭州沈仲圭敘於糧道山
