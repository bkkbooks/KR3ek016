body:
  text: 卷二化毒部無敵丹桑柴灰汁茄杆灰汁礦灰汁各一斗三汁熬調和勻名三仙膏亦可點癰疽之稍輕者再用鹼水熬膏一兩加入後開各藥末則成全方每三仙丹五兩配蟾酥三錢五分酒化明礬火硝各三錢牛黃麝香各一錢冰片珍珠硼砂雄黃輕粉乳香各一錢人乳浸銅緑硃砂各一錢五分各研極細末和勻再碾數千下將前膏加入攪得極勻收瓷罐內罐須小口以烏金紙塞口封以黃蠟勿令一毫泄氣遇毒取少許搽其頂干則以米醋和蜜少許潤之其血黑色或毒水爆出即時鬆解切不可著好肉上或用蕎麥麵調若遇疔瘡加鐵鏽一分研如飛塵和入多搽其正頂過宿其根爛出內服紫金錠若是癰疽再服蠟礬丸及托裡解毒之劑此藥癰疽對口疔瘡發背一切無名腫毒有奪命之功難以盡述惡瘡錠子白砒一錢麝香五分歸尾五分五味五分蟾酥一錢草烏一錢輕粉二錢川烏一錢月石五分血竭一錢全蠍二隻硼砂一錢銅緑五分銀硃五分雄黃五分共為極細末用人乳化蟾酥拌成錠子如大麥冬樣一分錠作兩段治二人將瘡用針刺破見血納入藥粒用紙貼上內成膿去藥洗淨為度萬應針頭丸麝香二錢血竭三錢輕粉三錢蟾酥三錢硼砂三錢大梅片一錢金頭赤足蜈蚣一條共為末煉蜜丸凡一切癰疽生於胸背毒大欲死向其頭上用針撬破去血以藥一黍米大放瘡口內用紙花吐津周圍濕之貼瘡罨定頃刻可愈化腐紫霞膏輕粉三錢萆麻仁三錢研血竭二錢巴豆霜五錢金頂砒五錢螺螄肉水二錢潮腦一錢共研勻罐貯凡發背已成瘀肉不腐及不作膿者又諸瘡內有膿外不穿者俱用此膏不腐爛者自腐不潰者自潰其功甚於烏金膏及碧霞錠子臨用以麻油調搽頑硬肉上以綿紙蓋之或以膏藥貼之亦可元珠膏本鱉子肉十四個斑蝥八十個柳枝四十九寸驢蹄甲片三錢草烏一錢麻油二兩上藥浸油內七日用文火炸枯去渣入巴豆仁三個煎至黑傾於鉢內研如泥加麝香一分攪勻入罐內凡腫瘍將潰搽之膿從毛孔吸出已開刀者用指護送孔內膿腐立刻能化隔皮取膿法驢蹄皮一兩炒為末砂炒蕎麥麵一兩草烏四錢刮去皮研末食鹽五錢共研細水糊作薄餅丸上炙微黃再研細以醋攤白紙上貼患處其膿水從毛孔而出蓋以粗紙摻濕再換水盡紙燥腫即消或患毒深遠刀難直取並患者懼開刀候膿熟時用此法最宜如不從毛竅出者其擦藥之處剩一洞自為出膿點頭部代刀丸白丁香一錢萆麻仁一錢生白砒三分共研為丸如黍米大凡一切腫毒內腫已成懼開刀者用一粒放患頂外以膏封之次日即能破頭又方斑蝥二十個巴豆四十粒共為末和丸如胡椒大每用一丸放患頂上膏封萬應代針膏硼砂一錢五分血竭一錢五分輕粉一錢五分蟾酥五分連頭蜈蚣一條炙麝香一分冰片少許雄黃一錢共為末用好蜜和成膏凡一切惡疽生於胸背毒大欲死者用小針將頭撥破以藥搽上一粒膏封過夜次早即破膿咬頭膏銅青松香乳香沒藥杏仁生木鱉粉萆麻仁各等分巴豆不去油加倍搗成膏每兩膏內加白砒一分搗勻臨用取緑豆大一粒放患頂用膏藥蓋之潰後即揭下洗淨換貼另藥凡胎前産後忌用替針丸川烏草烏五靈脂各二錢輕粉一分粉霜一分斑蝥二十個去翅足巴豆二十個去皮上先將二烏靈脂為末研勻次入輕粉粉霜研勻後入巴豆斑蝥以水調和為錠子拔毒部十面埋伏散麝香一錢蜈蚣十條炙甲片五錢乳香沒藥各六錢去油蟬衣六錢銀硃四錢殭蠶八錢炒斷絲全蠍五錢漂淡帶子蜂房六錢焙燥一切癰毒用之自能拔毒收功九龍丹斑蝥五分去頭足糯米炒黃乳香沒藥各三分去油雄黃二分血竭一分麝香一分五釐冰片七釐元胡五釐元參五釐共為極細末摻之拔毒生肌化腐附吊藥真蟾酥火酒化雄黃明礬紫石英硫黃各等分共為末用好酒調一日次日作條八仙丹蜈蚣五條全用全蠍五隻全用漂淡阿魏三錢殭蠶二錢炒斷絲炙甲片二錢血餘炭二錢乳香沒藥各二錢去油血竭二錢輕粉二錢大梅片三分兒茶二錢麝香三分浮肉不去加巴豆霜一錢如生肌拔毒則以原方用八將擒王散蜈蚣去頭足炒甲片漂全蠍蟬衣去頭足各四錢炒殭蠶炒蛇蛻各二錢生五倍子一兩另研極細末麝香一錢雄黃五錢水飛共為細末疔毒忌用太白九轉還元丹南星白芷半夏花粉川烏酒浸去皮川貝母各三錢草烏三錢去皮尖麝香一錢山茨菰五錢去毛真磁石五錢上俱生曬為末摻勿令出氣治一切癰毒未成即消已成即潰已潰即收功八將丹川文蛤一兩六錢去毛乳香沒藥各三錢去油雄黃三錢蜈蚣七條酒洗瓦上焙全蠍七個漂勿焙炙蟬衣七隻炙甲片七錢共研末摻治一切癰疽惟疔毒不宜用犀黃拔毒散真正頂犀黃五分明乳香一錢淨沒藥一錢豆瓣斑蝥一錢原麝五分共制細末摻治癰疽發背腐肉難化勢垂危者立刻見效此包氏之家藏方也去腐部黑靈丹大巴豆十六兩萆麻子五錢俱不可去殼安石臼內捶勻候天晴之日將風爐放露天上用鐵鍋以櫪炭火用長柄剷刀炒焦黑無白油可末為度研極細末凡一切頑惡毒升丹所不能提出者用此丹摻之神效黃靈丹生白礬六錢枯白礬三錢腰黃一錢共為極細末罐貯勿使有塵雜內凡一切毒臭腐死肉不去摻之自能生新肉若新肉上摻之要片刻一見膿水濕氣其痛即止如肉腐作痛先將金花散摻好肉上再用此丹摻腐上自不疼痛或用粉作條子亦可止痛部醉仙丹川烏草烏乳香沒藥去油木鱉子仁法用豆腐一塊將鱉入其中瓦上煆至腐枯取出去皮毛白酒藥鴉片各一錢木香五分共為細末火酒法丸如彈子大每重七分凡癰疽瘡毒值內托藥化毒之時痛不可當酒送一丸即能止痛動刀針外敷麻藥川烏草烏細辛南星半夏蟾酥各等分共為細末用好酒燉熟調搽待麻木不知痛癢時方可下手內服大麻藥香白芷川芎製半夏木鱉肉紫金皮大茴香牙皂臺烏藥當歸各二兩木香五分不見火生川烏生草烏各一兩共為末每服一錢好酒調下待麻不知疼痛方可下手若人昏沉用鹽水灌之生肌收口部十寶散白龍骨三錢真象皮三錢漂海螵蛸一錢五分赤石脂五錢乳香二錢五分去油沒藥二錢五分去油血竭三錢兒茶一錢五分麝香二分冰片二分五釐共研細末用以收口生肌又方赤石脂一兩煆冰片三錢煆龍骨三錢血竭兒茶各二錢琥珀一錢燈心同研乳香沒藥各一錢去油真象皮三錢廉珠一錢白雲丹輕白爐甘石一兩將傾銀罐內煆至通紅傾好醋內淬七次為度輕粉一錢白蠟二錢冰片一分赤云丹輕白爐甘石一兩黃連汁煆淬七次大梅片三錢水飛辰砂八錢又方木香三錢不見火水飛黃丹五錢枯礬五錢輕粉二錢共為細末用豬膽汁拌勻曬乾再研細摻之神效生肌散辰砂二錢血竭二錢海螵蛸三錢川貝三錢輕粉二錢冰片五分龍骨三錢寒水石五錢煆研細末可代大升又方煨嫩石膏二兩飛滑石二兩白龍骨二兩枯礬五錢海螵蛸二兩鉛粉五錢干胭脂五錢密陀僧五錢研細末用如無膿水摻之微作疼又方赤石脂六兩輕白爐甘石三兩二味用防風荊芥黃芩黃連黃柏連翹銀花羌活甘草等分煎濃湯煆紅淬汁內九次嫩石膏三兩冬煨夏生為末甘草水飛浸白龍骨二兩煆用童便淬七次用冰片一錢粉口兒茶一兩輕粉三兩川連一錢五分共為細末又方川文蛤二錢炒乳香去油沒藥各一錢枯礬五分又方黃靈藥四錢乳香沒藥兒茶各二錢珍珠一錢同腐制共為細末又方煆龍骨海螵蛸乳香沒藥象皮銼末或炙血竭輕粉各一錢赤石脂二錢冰片三分珍珠六分同腐制研至無聲麝香少許共為細末用又方兒茶白龍骨各一錢輕粉滑石各五分冰片五釐共為細末用神效八寶丹乳香沒藥血竭輕粉各二錢兒茶白龍骨鉛粉各一錢大梅片五分或加白占二錢赤石脂三錢兒脂骨一錢用之更妙生肌五寶丹制甘石一兩珍珠五錢輕粉三錢琥珀二錢冰片二分生肌七寶丹沒藥乳香各五分鉛粉三錢桃丹三錢辰砂三分六仙紅升五分川貝三錢去心用於乳癤最妙八寶丹人參犀黃各五錢輕粉白龍骨各一兩廉珠真象皮各八錢炙上冰片二錢又方珍珠乳細犀黃各五錢象皮銼末琥珀同燈心研煆龍骨輕粉各一兩五錢輕白爐甘石三兩用童便米醋黃連汁煆淬各三次冰片三錢生肌定痛散生石膏一兩為末甘草水飛辰砂三錢飛冰片二分月石五錢一方去辰砂入輕粉五錢共研末用以化腐生肌定痛神效生肌散煨石膏四錢赤石脂乳香沒藥輕粉煆龍骨各二錢血竭一錢兒茶一錢五分冰片五分紅升丹五錢神妙生肌散乳香沒藥各二錢二味燈心同研兒茶血竭海螵蛸赤石脂各一錢輕粉三分龜板鱉甲各一錢炒月石二錢水銀一錢黑鉛一錢先將鉛水銀同煎化另將前藥研末入鉛汞於其中再研極細末凡癰疽發背諸般瘡毒潰爛疼痛者摻之神效初起者加黃桐一錢作癢者加白芷一錢九一丹紅升丹一錢煨石膏九錢研勻摻之能生肌收口然須浮肉去淨方可用此珍珠散又名奇效八寶丹珍珠母即大蚌殼須露天之左顧者半爿刮去背後黑衣火上煆研細入後藥研爐甘石三兩黃連二錢煎汁煆淬七次用血竭三錢兒茶一兩煨石膏三兩赤石脂三兩煆陳年絲吐渣一兩煆存性大梅片臨用時每五錢用一分珍珠十寶散爐甘石黃連當歸煎濃汁煆淨九次用淨末八兩珍珠母一錢煆淨琥珀淨末七分龍骨煆水飛淨四分血竭二分赤石脂煆水飛淨四分辰砂水飛淨五分鐘乳石甘草湯制一伏時水飛淨六分象皮焙乳為末五分冰片每藥一錢加入二分研細摻生肌長肉生肌紅玉丹炒黃丹二錢煆龍骨二錢煨石膏三錢共研細摻鯽魚散一尾不落水去腸用之羯羊糞傾滿魚腹為度將炭火烘焦存性凡背疽大潰臟腑僅隔一膜候膿少欲收時為細末大有神效兼治一切潰瘍生肌收功又方川連二錢陀僧五錢胭脂二錢緑豆粉二錢雄黃輕粉各一錢十寶丹去油乳香粉一錢五分去油沒藥一錢五分血竭一錢五分辰砂一錢五分粉口兒茶一錢五分制甘石二兩赤石脂二兩小梅片一分五釐煨石膏二兩共研極細末摻之能生肌長肉收功神效去管部上品錠子紅礬一兩五錢乳香沒藥辰砂飛各三錢牛黃五分五釐硼砂一錢四分生熟各半白信一兩煆淨黑煙為度治漏管大症中品錠子白礬一兩八錢五分沒藥乳香各五錢五分辰砂五錢牛黃四分五釐硼砂一錢生熟對品金信一兩五錢煆淨黑煙為度治翻花癭瘤等症下品錠子治疔瘡發背等症再礬三兩二錢乳香六錢沒藥五錢辰砂三錢飛牛黃四分五釐硼砂一錢生熟各半白信三兩煆淨黑煙半月取起可用上各依法制用麵糊和勻捻成錠子看痔漏大小深淺插入錠如肉內黑色勿上生肌散只待黑肉落盡方可上若瘡無頭太乙膏一個加用後各藥黏一粒貼之白礬二兩乳香三錢二分沒藥三錢七分辰砂四分牛黃五分薑黃二錢五分須酌用白丁香一錢五分巴豆三錢二分去淨油共為末或吐沫調瘡一日三次瘡破插上前錠子三品一條槍明礬二兩白信一兩五錢二味共研極細入小罐內炭火煆紅青煙已淨旋起白煙片時待上下紅徹住火取罐傾地上宿一夜取出約其末一兩配入雄黃二錢四分乳香一錢二分共研極細厚糊調稠搓成線香式陰乾凡以上三品之症遇有孔者插入孔內無孔者先用針放孔竅早晚插藥二條插至三日後孔大每插十餘條插至七日患孔藥條滿足住後所患四邊自盡裂開大縫候至十四日前後疔核瘰癧痔漏諸管自然落下隨用湯洗膏貼用藥拔管方紫硇砂四分蜣螂五分紅升丹四