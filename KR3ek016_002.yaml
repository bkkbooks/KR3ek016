片二兩蝦蟆五十隻瞎地鱉蛇兩條大蜈蚣百條三毒俱要活麻油五斤桐油八兩桃柳桑枝各三十段每長三寸薑八兩蔥八兩法先將枝熬枯取出令丐者將瞎地鱉蛇活放入鍋急將鍋蓋撳住至蛇不動時再入蝦蟆後將前藥穿山甲蜈蚣全蠍等熬至藥枯黑濾去渣將鍋抹淨再以密絹濾油入鍋用文武火熬至滴水成珠離火再入上好洋丹三斤一手下丹一手揚硬木棍不住手攪勻成膏再入乳香沒藥各三錢去油麝香冰片各五錢四味預另研和勻徐徐摻入攪極勻成膏收貯出火毒凡癰疽發背對口搭手一切無名腫毒惡瘡貼之未成即消已成即潰可以不假升丹之力而能去腐止痛拔毒收功不二膏金石斛十六兩去根乳香四兩八錢去油川貝十六兩去心沒藥四兩八錢去油明天麻六兩八錢粉草六兩四錢巴豆肉五兩四錢去油用大麻油十二斤浸數日煎時下以活雄鯽魚兩尾煎枯去渣存油另用鉛粉炒黃研細二斤篩下收膏凡痰症癧串乳癤一切無名腫毒貼之神效如乳癤未潰者少加潮腦於膏上仙授神效藥紙端午蘄艾四五斤煎濃汁去渣入粒子紅花四兩煎一炷香再入去油乳香去油沒藥各八兩研細末煎一炷香再入真象皮末四兩煎一炷香加入牛皮膠二斤煎至膠化汁黏為度用羊毫排筆蘸藥汁搽刷大紅紙上陰乾凡狗咬蟲蟊蛇傷並跌打破皮及一切爛膀癤用津唾潤軟貼之速能奏效真神方也巴豆油膏巴豆三兩用麻油煎片時勿令枯再用綿料紙滾盡外面油以擂盆打自然油用夏布絞出加入輕粉三分拌勻瓷瓶收貯勿令出氣凡發背癰疽疔瘡等症看患大小以油照樣塗抹膏藥上貼之日換三次加味太乙膏肉桂白芷當歸元參赤芍大黃各二兩土木鱉子二兩血餘一兩真阿魏二錢切片滾化去油乳香末沒藥末各五錢槐枝柳枝各百段東丹四兩真麻油十斤如法熬煉後加輕粉四錢研細收膏凡癰疽發背一切惡瘡濕痰流注筋骨疼痛跌僕損傷遺精白帶等症貼之神效簡易玉紅膏真香油二十兩火上熬滾下淨頭髮五錢渣令淨雞子十個打破黃白攪勻徐入油內熬枯去渣下黃占五兩化開離火再入飛丹五兩攪勻之用能生肌收功止痛拔毒爛腿夾紙膏梅片四分煆甘石一兩二錢輕粉五錢白占三兩五錢菜油一斤夏天用先將菜油煎滾再入白占化開再將藥三味同煎
